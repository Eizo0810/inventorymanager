<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザー登録</title>
<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>ユーザー登録</h1>
        <div class="nav">
            <a th:href="@{/users}" class="btn">ユーザー管理へ戻る</a>
            <a th:href="@{/products}" class="btn">商品一覧</a>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/users}" method="post">
        <div class="form-group">
            <label class="form-label">ユーザー名</label>
            <input type="text"
                   name="username"
                   th:value="${userForm.username}"
                   class="form-control"
                   required>
        </div>

        <div class="form-group">
            <label class="form-label">パスワード</label>
            <input type="password"
                   name="password"
                   class="form-control"
                   minlength="6"
                   required>
        </div>

        <div class="form-group">
            <label class="form-label">権限</label>
            <select name="role" class="form-control">
                <option value="USER" th:selected="${userForm.role == 'USER'}">USER</option>
                <option value="ADMIN" th:selected="${userForm.role == 'ADMIN'}">ADMIN</option>
            </select>
        </div>

        <div class="form-group">
            <label>
                <input type="checkbox"
                       name="enabled"
                       value="true"
                       th:checked="${userForm.enabled}">
                有効
            </label>
        </div>

        <button type="submit" class="btn btn-primary">登録</button>
    </form>
</div>
</body>
</html>

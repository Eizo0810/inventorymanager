<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>ユーザー管理</title>
<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>ユーザー管理</h1>
        <div class="nav">
            <a th:href="@{/products}" class="btn">商品一覧</a>
            <a th:href="@{/users/new}" class="btn btn-primary">ユーザー登録</a>
        </div>
    </div>

    <div th:if="${param.registered}" class="alert alert-success">
        ユーザーを登録しました。
    </div>
    <div th:if="${param.updated}" class="alert alert-success">
        ユーザーを更新しました。
    </div>

    <table class="table">
        <tr>
            <th>ID</th>
            <th>ユーザー名</th>
            <th>権限</th>
            <th>状態</th>
            <th>操作</th>
        </tr>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}"></td>
            <td th:text="${user.username}"></td>
            <td th:text="${user.role}"></td>
            <td>
                <span th:if="${user.enabled}" class="badge badge-ok">有効</span>
                <span th:unless="${user.enabled}" class="badge badge-alert">無効</span>
            </td>
            <td>
                <a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn">編集</a>
            </td>
        </tr>
    </table>
</div>
</body>
</html>

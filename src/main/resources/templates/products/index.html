<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>商品一覧</title>
<link th:href="@{/css/app.css}" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="page-header">
        <h1>商品一覧</h1>
        <div class="nav">
            <a th:href="@{/stocks}" class="btn">在庫一覧</a>
            <a th:href="@{/products/new}" class="btn btn-primary">商品登録</a>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn">ログアウト</button>
            </form>
        </div>
    </div>

    <div th:if="${param.registered}" class="alert alert-success">
        商品を登録しました。
    </div>
    <div th:if="${param.updated}" class="alert alert-success">
        商品を更新しました。
    </div>

    <form th:action="@{/products}" method="get" class="form-row">
        <div>
            <label class="form-label">キーワード</label>
            <input type="text"
                   name="keyword"
                   th:value="${keyword}"
                   class="form-control"
                   placeholder="商品コード・商品名・カテゴリ">
        </div>
        <button type="submit" class="btn btn-primary">検索</button>
        <a th:href="@{/products}" class="btn">クリア</a>
    </form>

    <table class="table">
        <tr>
            <th>ID</th>
            <th>商品コード</th>
            <th>商品名</th>
            <th>カテゴリ</th>
            <th>安全在庫数</th>
            <th>操作</th>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.code}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="${product.safetyStock}"></td>
            <td>
                <a th:href="@{/products/{id}/edit(id=${product.id})}" class="btn">
                    編集
                </a>
                <a th:href="@{/products/{id}/movements(id=${product.id})}" class="btn">
                    入出庫
                </a>
            </td>
        </tr>
    </table>
</div>
</body>
</html>
